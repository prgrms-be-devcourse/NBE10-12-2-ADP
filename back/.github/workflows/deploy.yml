name: Build and Deploy

on:
  push:
    branches:
      - main-temp

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: ghcr.io/prgrms-be-devcourse/nbe10-12-2-adp:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker stop application
            docker rm application
            docker rmi ghcr.io/prgrms-be-devcourse/nbe10-12-2-adp
            docker pull ghcr.io/prgrms-be-devcourse/nbe10-12-2-adp
            docker run -d \
              --name application \
              --env-file .env \
              -p 8080:8080 \
              ghcr.io/prgrms-be-devcourse/nbe10-12-2-adp