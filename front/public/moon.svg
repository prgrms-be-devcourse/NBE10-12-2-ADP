<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Hand-drawn crescent moon icon">
  <title>Hand-drawn crescent moon icon</title>
  <desc>Excalidraw-style crescent moon icon with thin layered rough strokes.</desc>
  <style>
    .stroke {
      fill: none;
      stroke: #1f2328;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .main { stroke-width: 1.45; opacity: 0.82; }
    .soft { stroke-width: 1.15; opacity: 0.48; }
    .tiny { stroke-width: 1.05; opacity: 0.64; }
  </style>

